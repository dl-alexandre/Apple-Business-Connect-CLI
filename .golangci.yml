version: "2"
run:
  go: "1.24"
linters:
  enable:
    - bodyclose
    - dogsled
    - dupl
    - exhaustive
    - gocyclo
    - gosec
    - misspell
    - nakedret
    - unconvert
    - unparam
    - whitespace
  disable:
    - depguard
    - errorlint
    - goconst
    - gocritic
    - mnd
    - prealloc
    - revive
    - thelper
    - tparallel
    - wsl
  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocyclo:
      min-complexity: 15
    gosec:
      severity: medium
      confidence: medium
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - gosec
          - lll
        path: _test\.go
      - linters:
          - errcheck
          - gosec
        path: internal/cache/cache\.go
      - linters:
          - gosec
        path: internal/config/config\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/dl-alexandre/abc
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
