name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.24']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    
    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run tests
      run: go test -v -race ./...
    
    - name: Build
      run: go build -v ./cmd/abc
    
    - name: Test CLI help
      run: |
        ./abc --help
        ./abc version

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m

  build-all:
    name: Build All Platforms
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    
    - name: Build Linux AMD64
      run: GOOS=linux GOARCH=amd64 go build -o dist/abc-linux-amd64 ./cmd/abc
    
    - name: Build Linux ARM64
      run: GOOS=linux GOARCH=arm64 go build -o dist/abc-linux-arm64 ./cmd/abc
    
    - name: Build macOS AMD64
      run: GOOS=darwin GOARCH=amd64 go build -o dist/abc-darwin-amd64 ./cmd/abc
    
    - name: Build macOS ARM64
      run: GOOS=darwin GOARCH=arm64 go build -o dist/abc-darwin-arm64 ./cmd/abc
    
    - name: Build Windows AMD64
      run: GOOS=windows GOARCH=amd64 go build -o dist/abc-windows-amd64.exe ./cmd/abc
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: dist/*
